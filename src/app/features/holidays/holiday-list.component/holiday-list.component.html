<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="holidays">
  <div class="page-header">
    <div>
      <h1>Holidays</h1>
      <p>Company holidays — used in salary calculation</p>
    </div>
    <button pButton label="Add Holiday" icon="pi pi-plus" (click)="showDialog = true"></button>
  </div>

  <div class="section-card">
    <p-table [value]="holidays" [loading]="loading"
             styleClass="p-datatable-sm p-datatable-striped"
             [paginator]="true" [rows]="15">
      <ng-template pTemplate="header">
        <tr>
          <th>#</th>
          <th pSortableColumn="date">Date <p-sortIcon field="date"></p-sortIcon></th>
          <th>Day</th>
          <th>Holiday Name</th>
          <th>Description</th>
          <th>Action</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-h let-i="rowIndex">
        <tr>
          <td>{{ i+1 }}</td>
          <td><strong>{{ h.date | date:'dd MMM yyyy' }}</strong></td>
          <td class="day-cell">{{ h.date | date:'EEEE' }}</td>
          <td>
            <div class="holiday-name">
              <span class="star">★</span> {{ h.name }}
            </div>
          </td>
          <td class="desc-cell">{{ h.description || '—' }}</td>
          <td>
            <button pButton icon="pi pi-trash" severity="danger" size="small"
                    pTooltip="Delete" (click)="confirmDelete(h)"></button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="6" class="empty-cell">Koi holiday add nathi thayel</td></tr>
      </ng-template>
    </p-table>
  </div>

  <p-dialog header="Add Holiday" [(visible)]="showDialog" [modal]="true"
            [style]="{width:'420px'}" [draggable]="false">
    <div class="dialog-form">
      <div class="field">
        <label>Holiday Name *</label>
        <input pInputText [(ngModel)]="form.name" placeholder="Diwali, Holi, Republic Day..." style="width:100%" />
      </div>
      <div class="field">
        <label>Date *</label>
        <input type="date" [(ngModel)]="form.date" class="date-input" />
      </div>
      <div class="field">
        <label>Description (Optional)</label>
        <input pInputText [(ngModel)]="form.description" placeholder="National festival..." style="width:100%" />
      </div>
    </div>
    <ng-template pTemplate="footer">
      <button pButton label="Cancel" severity="secondary" (click)="showDialog = false"></button>
      <button pButton label="Add Holiday" icon="pi pi-plus" (click)="add()" [loading]="addLoading"></button>
    </ng-template>
  </p-dialog>
</div>
